<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker V2.0</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Geist:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="night">
    <!-- Toast -->
    <div class="toast" id="toast" role="status" aria-live="polite">
      <i class="fa-solid fa-circle-check toast-icon" id="toast-icon"></i>
      <span id="toast-msg">Done</span>
    </div>

    <!-- Delete Confirmation Modal -->
    <div
      class="modal-backdrop"
      id="confirm-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
    >
      <div class="modal">
        <div class="modal-icon">
          <i class="fa-solid fa-trash-can"></i>
        </div>
        <div>
          <div class="modal-title" id="modal-title">Delete Transaction?</div>
          <div class="modal-desc">This action cannot be undone.</div>
        </div>
        <div class="modal-tx-preview">
          <span class="modal-tx-name" id="modal-tx-name">—</span>
          <span class="modal-tx-amount" id="modal-tx-amount">—</span>
        </div>
        <div class="modal-actions">
          <button class="modal-btn cancel" id="modal-cancel">
            <i class="fa-solid fa-xmark"></i> Cancel
          </button>
          <button class="modal-btn confirm-delete" id="modal-confirm">
            <i class="fa-solid fa-trash-can"></i> Delete
          </button>
        </div>
      </div>
    </div>

    <div class="wrapper">
      <!-- Header -->
      <div class="header card">
        <div class="header-title">
          <div class="logo-dot"></div>
          <h1>Expense Tracker</h1>
        </div>
        <div class="header-actions">
          <button
            class="icon-btn"
            id="theme-btn"
            aria-label="Toggle theme"
            title="Toggle theme"
          >
            <i class="fa-solid fa-moon" id="theme-icon"></i>
          </button>
        </div>
      </div>

      <!-- Balance -->
      <div class="balance-card">
        <p class="balance-label">Total Balance</p>
        <div class="balance-amount" id="show-balance">
          0 <span class="currency">ETB</span>
        </div>
        <div class="stats-row">
          <div class="stat-item">
            <div class="stat-icon income">
              <i class="fa-solid fa-arrow-trend-up"></i>
            </div>
            <div class="stat-info">
              <div class="stat-label">Income</div>
              <div class="stat-amount income" id="show-income">0</div>
            </div>
          </div>
          <div class="stat-item">
            <div class="stat-icon expense">
              <i class="fa-solid fa-arrow-trend-down"></i>
            </div>
            <div class="stat-info">
              <div class="stat-label">Expenses</div>
              <div class="stat-amount expense" id="show-expense">0</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Add Transaction Form -->
      <div class="card form-card">
        <p class="form-title" id="form-mode-label">New Transaction</p>

        <div class="input-row">
          <div class="input-group">
            <label class="field-label" for="description-input"
              >Description</label
            >
            <input
              type="text"
              id="description-input"
              placeholder="e.g. Grocery run"
              autocomplete="off"
            />
            <span class="error-msg" id="desc-error"></span>
          </div>
          <div class="input-group" style="flex: 0 0 140px; min-width: 120px">
            <label class="field-label" for="amount-input">Amount (ETB)</label>
            <input
              type="number"
              id="amount-input"
              placeholder="0.00"
              min="0"
              step="0.01"
            />
            <span class="error-msg" id="amount-error"></span>
          </div>
        </div>

        <div class="input-group">
          <label class="field-label">Type</label>
          <div class="type-toggle">
            <input type="radio" name="txtype" id="income" checked />
            <label for="income"
              ><i class="fa-solid fa-circle-arrow-up"></i> Income</label
            >
            <input type="radio" name="txtype" id="expense" />
            <label for="expense"
              ><i class="fa-solid fa-circle-arrow-down"></i> Expense</label
            >
          </div>
        </div>

        <button id="add-btn">
          <i class="fa-solid fa-plus"></i>
          <span id="btn-label">Add Transaction</span>
        </button>
      </div>

      <!-- Transaction History -->
      <div class="card">
        <div class="tx-header">
          <span class="tx-title">Transactions</span>
          <div class="tx-header-actions">
            <button class="export-btn" id="export-btn" title="Export to CSV">
              <i class="fa-solid fa-file-arrow-down"></i> Export CSV
            </button>
            <span class="tx-count" id="tx-count">0</span>
          </div>
        </div>
        <ul id="transactionHistory"></ul>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
